<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextCompany - Painel Administrativo</title>
    <script src="/js/gatekeeper.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="/js/auth-utils.js" defer></script>
    <script src="/js/admin.js" defer></script>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0"><i class="fa-solid fa-user-gear me-2"></i>Painel Administrativo</h1>
            <a href="/dashboard" class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </div>

        <div id="viewColaboradores" class="view-section">
            <div class="main-card p-4 mb-4">
                <div class="row g-3 align-items-center">
                    <div class="col-md-8">
                        <h5 class="mb-1">Selecione um Colaborador</h5>
                        <p class="text-muted small mb-0">Pesquise pelo nome para acessar a folha de ponto.</p>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="Buscar funcionário..." id="inputBuscaColaborador">
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-card p-0 overflow-hidden mb-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Colaborador</th>
                                <th>Email</th>
                                <th class="text-end pe-4">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaColaboradoresBody">
                            <tr><td colspan="3" class="text-center py-4">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center p-3 border-top bg-light">
                    <div class="d-flex align-items-center">
                        <span class="text-muted small me-2">Por página:</span>
                        <select id="selectItensPorPagina" class="form-select form-select-sm" style="width: auto;">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                        </select>
                        <span class="text-muted small ms-3" id="infoPaginacaoColab">0 de 0</span>
                    </div>
                    
                    <nav>
                        <ul class="pagination pagination-sm mb-0" id="containerPaginacao">
                            </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
